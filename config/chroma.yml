collection_name: agent # 向量数据库表名（RAG 知识库）
persist_directory: ../chroma_db # RAG 向量库目录

# --- 长期记忆（模型用：历史摘要、用户画像等，与 RAG 分离）---
memory_collection_name: user_memory
memory_persist_directory: ../chroma_memory_db
# 写入时若已存在相同 user_id + 内容哈希的文档则跳过（避免重复事件堆积、减轻矛盾检索）
memory_dedupe_on_write: true
# 检索注入：先按相似度多取 overfetch*k 条（上限 max_cap），再按 created_at 新到旧排序，按 content_sha256 去重后取前 k 条
memory_retrieve_overfetch: 2
memory_retrieve_max_cap: 40
# 向量记忆 TTL（天）：仅用于 schedule/purge_expired_memory.py 定时物理删除；0 表示不删。无 created_at 的旧数据不删
memory_ttl_days: 90
# 无 query 时（若调用 get_relevant_all）从库中拉取的最大条数再排序截断
memory_list_user_max_cap: 80
# 向量粗排从 Chroma 取回的条数；仅当 rerank_enabled 为 true 时生效，应 >= k
# 过大则 Chroma 与重排都变慢；追求低延迟可先试 8～12
fetch_k: 12
# 精排后进入 RAG 上下文的条数（CrossEncoder top_n）
k: 3
# 是否启用 BGE CrossEncoder 精排（需 sentence-transformers）
rerank_enabled: true
# 创建 ReactAgent 时预加载 BGE（避免首次 RAG 才加载）；仅 rerank_enabled=true 时生效
rerank_preload_on_startup: true
# 访问 huggingface.co 超时：填镜像（等价于环境变量 HF_ENDPOINT）。国内可试 https://hf-mirror.com
hf_endpoint: https://hf-mirror.com
# HuggingFace 模型 id；或已下载到本地的文件夹路径（也可用 ../models/xxx 相对 utils 根）
rerank_model: ../models/bge-reranker-base
#rerank_model: BAAI/bge-reranker-base

# cpu 或 cuda / cuda:0
rerank_device: cpu
# 个别模型需 trust_remote_code，一般为 false
rerank_trust_remote_code: false
# 精排分数（越高越相关，刻度因模型而异）：低于 rerank_refuse_min_score 则拒答（不返回片段）；不填则关闭
# rerank_refuse_min_score: -20.0

# 检索用查询向量 LRU（重复/改写命中相同子串时跳过 DashScope）；0=关闭
query_embedding_cache_max_entries: 2048
# 进程内首次创建 OnlineQueryService 时做一次极轻量检索，预热 Chroma + 嵌入链路
recall_warmup_on_startup: true

# --- 查询改写：多路向量召回合并后再精排（提召回）---
query_rewrite_enabled: true
query_rewrite_max_variants: 2
# 改写专用小模型；不配或留空则用 rag.yml 的 turbo_chat_model_name
query_rewrite_model: qwen-turbo
query_rewrite_max_tokens: 256
query_rewrite_temperature: 0
# true：走 stream/astream 聚合全文（部分链路首包更早）；false：invoke/ainvoke
query_rewrite_stream: true
# 改写结果 LRU 条数；0 表示关闭缓存（同句重复问命中则跳 LLM）
query_rewrite_cache_max_entries: 512
# 合并去重后参与 BGE 打分的最大条数
merge_max_pool: 60

# --- 混合检索：BM25 与向量结果合并去重后再精排（全库建 BM25，首次略慢）---
hybrid_bm25_enabled: false

data_path: ../data # 数据文件夹
md5_hex_store: md5.text # 去重记录
allow_knowledge_file_type: [ "txt", "pdf" ]

chunk_size: 200
chunk_overlap: 20
separators: [ "\n\n", "\n", ".", "!", "?", "。", "！", "？", " ", "" ]

# --- 父子块（Small-to-Big）：子块进向量库；父块正文存 SQLite 映射表，不塞进 Chroma metadata ---
# 开启后需重新跑离线索引；需配置 parent_child_map_path
parent_child_enabled: false
parent_chunk_size: 1200
parent_chunk_overlap: 100
# 父块全文落库路径（相对 utils）；与 chroma_db 并列即可
parent_child_map_path: ../chroma_db/parent_chunks.sqlite
# 写入映射表前父块最大字符数，0 表示不截断（SQLite 单字段通常足够大）
parent_insert_max_chars: 0
